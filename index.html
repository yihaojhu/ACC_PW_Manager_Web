<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Password Manager</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="app-container">
        <!-- Top Menu Bar -->
        <nav class="menubar">
            <div class="menu-item">
                <span id="menuFile">File</span>
                <div class="dropdown">
                    <button id="actionNew">New</button>
                    <button id="actionOpen">Open</button>
                    <button id="actionSave">Save</button>
                    <button id="actionSaveAs">Save As</button>
                    <div id="recentFilesContainer" class="hidden">
                        <hr class="dropdown-divider">
                        <div id="recentFilesList"></div>
                    </div>
                </div>
            </div>
            <div class="menu-item">
                <span id="menuLanguage">Language</span>
                <div class="dropdown">
                    <button id="actionEnglish">English</button>
                    <button id="actionChinese">Chinese</button>
                </div>
            </div>
            <div class="menu-item" style="margin-left: auto;">
                <span id="actionAbout">About</span>
            </div>
        </nav>

        <!-- Toolbar -->
        <div class="toolbar glass-panel">
            <button id="toolbarNew" class="toolbar-btn" title="New">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toolbar-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
            </button>
            <button id="toolbarOpen" class="toolbar-btn" title="Open">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toolbar-icon"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </button>
            <button id="toolbarSave" class="toolbar-btn" title="Save">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toolbar-icon"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </button>
            <button id="toolbarSaveAs" class="toolbar-btn" title="Save As">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toolbar-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>

        <!-- Main Content Layout -->
        <div class="main-layout">
            <!-- Central Widget -->
            <main class="central-widget glass-panel">
                <h1 id="titleMainWindow" class="app-title">Account Password Manager</h1>
                <div class="status-message" id="statusMessage">Ready</div>

                <div class="form-grid">
                    <label for="magicNumber" id="labelMagicNumber">Magic Number:</label>
                    <input type="password" id="magicNumber" maxlength="24" placeholder="Enter secret key..." autocomplete="new-password">

                    <label for="service" id="labelService">Service:</label>
                    <input type="text" id="service" placeholder="e.g. GitHub" autocomplete="off">

                    <label for="account" id="labelAccount">Account:</label>
                    <input type="text" id="account" placeholder="Username or Email" autocomplete="off">

                    <label for="password" id="labelPassword">Password:</label>
                    <input type="text" id="password" placeholder="Password" autocomplete="off">
                </div>

                <div class="button-row">
                    <button id="buttonAdd" class="btn primary" disabled>Add</button>
                    <button id="buttonRemove" class="btn danger" disabled>Remove</button>
                    <button id="buttonFind" class="btn secondary" disabled>Find</button>
                    <button id="buttonClear" class="btn outline">Clear</button>
                </div>
            </main>

            <!-- Sidebar -->
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h2 id="dockWidgetServices">List of Services</h2>
                    <button id="buttonSort" class="btn outline btn-icon" title="Sort Order">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M20 8h-5"/><path d="M15 10V6.5a2.5 2.5 0 0 1 5 0V10"/><path d="M15 14h5l-5 6h5"/></svg>
                    </button>
                </div>
                <ul id="listWidgetServices" class="service-list">
                    <!-- Service items will be injected here -->
                </ul>
            </aside>
        </div>
        <footer class="footer">
            <span id="footerFileStatus">Unnamed File</span>
        </footer>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <h3 id="modalTitle">Notice</h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons" id="modalButtons">
                <button id="modalBtnYes" class="btn primary">Yes</button>
                <button id="modalBtnNo" class="btn danger">No</button>
                <button id="modalBtnCancel" class="btn outline">Cancel</button>
                <button id="modalBtnOk" class="btn primary hidden">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
